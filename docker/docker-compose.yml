version: '3.8'
services:
  mindflow-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mindflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mindflow-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  mindflow-es:
    image: elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  mindflow-minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  mindflow-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: mindflow-db
      REDIS_HOST: mindflow-redis
      S3_ENDPOINT: http://mindflow-minio:9000
    depends_on:
      - mindflow-db
      - mindflow-redis

volumes:
  postgres_data:
  redis_data:
  minio_data:
